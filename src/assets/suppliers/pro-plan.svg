<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 60" width="100%" height="100%">
  <style>
    .brand1 { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 14px; fill: #1E1E1E; letter-spacing: 2px; }
    .brand2 { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 800; font-size: 18px; fill: #1E1E1E; letter-spacing: 1px; }
    .line { stroke: #D4AF37; stroke-width: 2; }
  </style>
  <g transform="translate(10, 10)">
    <!-- Gold shield / crest -->
    <path d="M 12,5 L 22,5 L 22,18 L 17,23 L 12,18 Z" fill="#D4AF37" />
    <path d="M 17,9 L 17,19" stroke="#1E1E1E" stroke-width="1.5" />
    
    <!-- Text -->
    <text x="32" y="16" class="brand1">PURINA</text>
    <text x="32" y="32" class="brand2">PRO PLAN</text>
    
    <!-- Gold line -->
    <line x1="32" y1="38" x2="130" y2="38" class="line" />
  </g>
</svg>
