<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 60" width="100%" height="100%">
  <style>
    .brand { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 800; font-size: 18px; fill: #D32F2F; letter-spacing: 0.5px; }
    .sub { font-family: Arial, sans-serif; font-size: 5px; fill: #757575; letter-spacing: 1.5px; }
  </style>
  <g transform="translate(15, 10)">
    <!-- Checkerboard icon -->
    <g transform="translate(0, 8)">
      <rect x="0" y="0" width="8" height="8" fill="#D32F2F" />
      <rect x="8" y="0" width="8" height="8" fill="#EEEEEE" />
      <rect x="16" y="0" width="8" height="8" fill="#D32F2F" />
      
      <rect x="0" y="8" width="8" height="8" fill="#EEEEEE" />
      <rect x="8" y="8" width="8" height="8" fill="#D32F2F" />
      <rect x="16" y="8" width="8" height="8" fill="#EEEEEE" />
      
      <rect x="0" y="16" width="8" height="8" fill="#D32F2F" />
      <rect x="8" y="16" width="8" height="8" fill="#EEEEEE" />
      <rect x="16" y="16" width="8" height="8" fill="#D32F2F" />
    </g>
    <!-- Brand text -->
    <text x="32" y="22" class="brand">PURINA</text>
    <text x="33" y="30" class="sub">YOUR PET, OUR PASSION.</text>
  </g>
</svg>
